<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumo — Life Feels Lighter</title>

  <link rel="icon" type="image/png" href="/favicon_32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #ffffff;
      color: #111;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-text {
      max-width: 420px;
    }

    .hero-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }

    .cta {
      display: inline-block;
      padding: 0.9rem 1.6rem;
      background: black;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }

    .hero-image img {
      width: 100%;
      max-width: 360px;
      height: auto;
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 800px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-text">
      <img src="/lumo_sparkle_glyph.svg" alt="Lumo icon" class="hero-icon" />

      <h1>Life feels lighter with Lumo</h1>
      <p>Your tasks, meals, budget, and days — all in one calm, beautifully designed place.</p>

      <a href="/app" class="cta">Open the App</a>
    </div>

    <div class="hero-image">
      <img src="/lumo-app.png" alt="Lumo app screenshot" />
    </div>
  </section>
</body>
</html>
