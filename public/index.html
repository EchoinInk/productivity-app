<!DOCTYPE html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumo — A tiny app for overwhelmed humans trying their best</title>

    <style>
      /* --- Reset --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        background: linear-gradient(180deg, #fafafa 0%, #f3f3f7 100%);
        color: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 24px;
        text-align: center;
      }

      h1 {
        font-size: 2.4rem;
        font-weight: 600;
        margin-bottom: 16px;
        line-height: 1.2;
      }

      p.subtitle {
        font-size: 1.2rem;
        max-width: 420px;
        margin: 0 auto 32px;
        opacity: 0.8;
        line-height: 1.5;
      }

      .hero {
        width: 100%;
        max-width: 420px;
        margin: 0 auto 40px;
      }

      .hero img {
        width: 100%;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      }

      .cta {
        display: inline-block;
        padding: 14px 28px;
        background: #111;
        color: #fff;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.2s ease;
      }

      .cta:hover {
        opacity: 0.85;
      }

      footer {
        margin-top: 48px;
        font-size: 0.85rem;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <h1>Lumo</h1>
    <p class="subtitle">A tiny app for overwhelmed humans trying their best.</p>

    <div class="hero">
      <img src="lumo-app.png" alt="Lumo app preview" />
    </div>

    <a class="cta" href="/app/">Open the App</a>

    <footer>© 2026 Lumo</footer>
  </body>
</html>
